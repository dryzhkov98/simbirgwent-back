version: '3.9'

services:
  simbirgwent-backend:
    container_name: simbirgwent-backend
    env_file:
      - .env
    environment:
      - NODE_VERSION=${NODE_VERSION}
      - PORT=${PORT}
    ports:
      - ${PORT}:${PORT}
    build:
      context: .
      args:
        - NODE_VERSION=${NODE_VERSION}
        - PORT=${PORT}
    restart: always
